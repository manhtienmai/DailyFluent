name: Deploy to Production (Blue/Green)

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

concurrency:
  group: prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: dailyfluent
      REMOTE_APP_DIR: /home/mtmanh/apps/DailyFluent

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ===== Build assets on CI to save VM RAM =====
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Tailwind (npm)
        run: |
          if [ -f "theme/static_src/package.json" ]; then
            cd theme/static_src
            npm ci
            npm run build
          else
            echo "No theme/static_src/package.json, skipping npm build"
          fi

      - name: Build Next.js frontend
        run: |
          cd frontend
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

      - name: Package artifact
        run: |
          set -euo pipefail
          ARTIFACT="/tmp/${{ env.APP_NAME }}_${{ github.sha }}.tar.gz"
          STAGE="/tmp/${{ env.APP_NAME }}_stage_${{ github.sha }}"

          rm -rf "$STAGE"
          mkdir -p "$STAGE"

          rsync -a --delete \
            --exclude=".git" \
            --exclude="venv" \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            --exclude=".env" \
            --exclude="node_modules" \
            --exclude="staticfiles" \
            --exclude="media" \
            --exclude="*.sqlite3" \
            ./ "$STAGE/"

          tar -C "$STAGE" -czf "$ARTIFACT" .
          echo "ARTIFACT=$ARTIFACT" >> $GITHUB_ENV

      # ===== SSH Agent & Security bypass =====
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      # Bước này giúp GitHub làm quen với IP mới của server Nhật
      - name: Add VM to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.VM_PORT }}" -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      # ===== Upload với tùy chọn bỏ qua xác thực vân tay server =====
      - name: Upload artifact to VM
        run: |
          scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -P "${{ secrets.VM_PORT }}" "$ARTIFACT" \
            "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/tmp/$(basename "$ARTIFACT")"

      # ===== Deploy trên VM (Blue/Green switch) =====
      - name: Deploy on VM
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -p "${{ secrets.VM_PORT }}" "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" 'bash -s' <<'EOF'
          set -euo pipefail

          APP_DIR="/home/mtmanh/apps/DailyFluent"
          RELEASES_DIR="$APP_DIR/releases"

          # Tìm file vừa upload lên
          ARTIFACT_FILE="$(ls -1t /tmp/dailyfluent_*.tar.gz | head -n1)"
          SHA="$(basename "$ARTIFACT_FILE" | sed -E 's/dailyfluent_([0-9a-f]+)\.tar\.gz/\1/')"
          TS="$(date +%Y%m%d_%H%M%S)"
          REL="$RELEASES_DIR/${TS}_${SHA:0:7}"

          mkdir -p "$REL"
          tar -xzf "$ARTIFACT_FILE" -C "$REL"

          # Đảm bảo quyền sở hữu chính xác
          chown -R mtmanh:mtmanh "$REL"

          # Chạy script đổi bản Blue sang Green hoặc ngược lại
          # Hãy chắc chắn file deploy_bg.sh đã có trên server mới
          HEALTH_PATH=/health "$APP_DIR/deploy_bg.sh" "$REL"

          rm -f "$ARTIFACT_FILE"
          EOF