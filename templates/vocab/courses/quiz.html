{% extends "layouts/sidebar_layout.html" %}
{% load static %}

{% block title %}Quiz Set {{ set_number }} - {{ config.label }} | DailyFluent{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/toeic.css' %}?v=20260216b">
{% endblock %}

{% block content %}
<div class="df-quiz-page" x-data="toeicQuiz()" x-init="init()">
<div class="df-quiz-container">

  <!-- Quiz Header (compact) -->
  <div class="df-quiz-header">
    <a href="{% url 'vocab:course_set_detail' slug=course.slug set_number=set_number %}" class="df-quiz-header__back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <span class="df-quiz-header__title">Set {{ set_number }}</span>
    <div class="df-quiz-header__progress">
      <span class="df-quiz-header__counter" x-text="(currentIndex + 1) + ' / ' + questions.length"></span>
      <div class="df-quiz-header__bar">
        <div class="df-quiz-header__fill" :style="'width:' + ((currentIndex + 1) / questions.length * 100) + '%'"></div>
      </div>
    </div>
  </div>

  <!-- Question Card -->
  <div class="df-quiz-glass-panel df-quiz-main-card" x-show="!showResult">
    <div class="df-toeic-quiz-area">
      <div class="df-toeic-quiz-word">
        <!-- JP meaning quiz: show kanji with furigana -->
        <template x-if="isJP && currentQ?.quiz_type === 'meaning' && currentQ?.html_display">
          <span x-html="currentQ.html_display" style="font-size:1.4em; font-weight:800; line-height:1.6"></span>
        </template>
        <!-- JP reading quiz: show kanji WITHOUT furigana -->
        <template x-if="isJP && currentQ?.quiz_type === 'reading'">
          <span x-text="currentQ.word" style="font-size:1.4em; font-weight:800"></span>
        </template>
        <!-- JP kanji quiz: show reading + meaning hint -->
        <template x-if="isJP && currentQ?.quiz_type === 'kanji'">
          <div style="text-align:center">
            <span style="font-size:1.4em; font-weight:800" x-text="currentQ.reading"></span>
            <div style="margin-top:0.3em; font-size:0.95em; opacity:0.75" x-text="currentQ.meaning"></div>
          </div>
        </template>
        <!-- English / non-JP -->
        <template x-if="!isJP">
          <span x-text="currentQ?.word"></span>
        </template>
        <button type="button" class="df-toeic-learn-audio-btn df-toeic-learn-audio-btn--sm"
                @click="playAudio()" x-show="currentQ?.audio_url && currentQ?.quiz_type !== 'kanji'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 010 7.07"/>
          </svg>
        </button>
      </div>
      <template x-if="!isJP">
        <div class="df-toeic-quiz-ipa" x-text="currentQ?.ipa"></div>
      </template>



      <div class="df-toeic-quiz-choices">
        <template x-for="(choice, ci) in (currentQ?.choices || [])" :key="ci">
          <button type="button"
                  class="df-toeic-quiz-choice"
                  :class="{
                    'df-toeic-quiz-choice--correct': answered && choice === currentQ.correct,
                    'df-toeic-quiz-choice--wrong': answered && selectedIndex === ci && choice !== currentQ.correct,
                    'df-toeic-quiz-choice--disabled': answered,
                  }"
                  :disabled="answered"
                  @click="answer(ci)">
            <span class="df-toeic-quiz-choice-letter" x-text="['A','B','C','D'][ci]"></span>
            <span x-text="choice"></span>
          </button>
        </template>
      </div>

      <!-- Feedback -->
      <div class="df-toeic-quiz-feedback" x-show="answered" x-transition>
        <template x-if="isCorrect">
          <div class="df-toeic-quiz-feedback--correct">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:24px;height:24px;">
              <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            Chính xác!
          </div>
        </template>

        <button type="button" class="df-toeic-btn df-toeic-btn--primary df-quiz-next-btn"
                @click="nextQuestion()" x-text="currentIndex < questions.length - 1 ? 'Tiếp theo →' : 'Xem kết quả'">
        </button>
      </div>
    </div>
  </div>

  <!-- Results Screen -->
  <div class="df-quiz-glass-panel df-quiz-main-card" x-show="showResult" x-transition>
    <div class="df-toeic-quiz-result">
      <div class="df-toeic-quiz-result-icon" x-text="pct >= 80 ? '🎉' : '💪'"></div>
      <h2 class="df-toeic-quiz-result-title" x-text="pct >= 80 ? 'Xuất sắc!' : 'Cố lên!'"></h2>

      <div class="df-toeic-quiz-result-score">
        <span class="df-toeic-quiz-result-score-big" x-text="score"></span>
        <span class="df-toeic-quiz-result-score-total">/ <span x-text="questions.length"></span></span>
      </div>

      <div class="df-toeic-quiz-result-pct"
           :class="{'df-toeic-quiz-result-pct--pass': pct >= 80}">
        <span x-text="pct + '%'"></span>
      </div>

      <template x-if="pct >= 80">
        <p class="df-toeic-quiz-result-msg">Hoàn thành bộ từ! Bạn đã nắm vững bộ từ này.</p>
      </template>
      <template x-if="pct < 80">
        <p class="df-toeic-quiz-result-msg">Đạt 80% trở lên để hoàn thành bộ từ.</p>
      </template>

      <div class="df-toeic-learn-summary-actions">
        <template x-if="pct < 80">
          <a href="{% url 'vocab:course_learn' slug=course.slug set_number=set_number %}" class="df-toeic-btn df-toeic-btn--secondary">
            Học lại từ vựng
          </a>
        </template>
        <button type="button" @click="retry()" class="df-toeic-btn df-toeic-btn--primary" x-show="pct < 80">
          Làm lại
        </button>
        <a href="{% url 'vocab:course_detail' slug=course.slug %}" class="df-toeic-btn df-toeic-btn--primary" x-show="pct >= 80">
          Tiếp tục
        </a>
        <a href="{% url 'vocab:course_set_detail' slug=course.slug set_number=set_number %}" class="df-toeic-btn df-toeic-btn--secondary" x-show="pct >= 80">
          Quay về Set
        </a>
      </div>
    </div>
  </div>

  <!-- Hidden data -->
  <script id="toeic-quiz-data" type="application/json">{{ questions_json|safe }}</script>
  <form id="csrf-form" class="hidden">{% csrf_token %}</form>
</div>
</div>

<script>
function toeicQuiz() {
  return {
    questions: [],
    currentIndex: 0,
    answered: false,
    selectedIndex: null,
    isCorrect: false,
    score: 0,
    wrongIds: [],
    showResult: false,
    audioEl: null,
    isJP: '{{ config.language }}' === 'jp',

    get currentQ() {
      return this.questions[this.currentIndex] || null;
    },
    get pct() {
      return this.questions.length ? Math.round(this.score / this.questions.length * 100) : 0;
    },


    init() {
      const raw = document.getElementById('toeic-quiz-data');
      this.questions = JSON.parse(raw.textContent);
      this.audioEl = new Audio();
    },

    playAudio() {
      if (this.currentQ && this.currentQ.audio_url) {
        this.audioEl.src = this.currentQ.audio_url;
        this.audioEl.play().catch(() => {});
      }
    },

    answer(index) {
      if (this.answered) return;
      this.answered = true;
      this.selectedIndex = index;
      const selected = this.currentQ.choices[index];
      this.isCorrect = selected === this.currentQ.correct;
      if (this.isCorrect) {
        this.score++;
      } else {
        this.wrongIds.push(this.currentQ.vocab_id);
      }
    },

    nextQuestion() {
      if (this.currentIndex < this.questions.length - 1) {
        this.currentIndex++;
        this.answered = false;
        this.selectedIndex = null;
        this.isCorrect = false;
      } else {
        this.submitResults();
      }
    },

    async submitResults() {
      const csrf = document.querySelector('#csrf-form [name=csrfmiddlewaretoken]').value;
      try {
        const resp = await fetch("{% url 'vocab:api_course_quiz_result' %}", {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrf,
          },
          body: JSON.stringify({
            set_id: {{ vocab_set.id }},
            score: this.score,
            total: this.questions.length,
            wrong_word_ids: this.wrongIds,
          }),
        });
        const data = await resp.json();
        if (data && data.new_badges && window.BadgeManager) {
            window.BadgeManager.show(data.new_badges);
        }
      } catch (err) {
        console.error('Failed to submit quiz results', err);
      }
      this.showResult = true;
    },

    retry() {
      window.location.reload();
    },
  };
}
</script>
{% endblock %}
