name: daily_fluent
description: DailyFluent - Learn Japanese & English
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & API
  dio: ^5.4.1
  
  # Routing
  go_router: ^14.0.2

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Charts
  fl_chart: ^0.68.0

  # Video (disabled for web — flutter_inappwebview crashes)
  # youtube_player_flutter: ^9.0.1

  # Notifications
  # firebase_core: ^2.25.4
  # firebase_messaging: ^14.7.15

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.4
  package_info_plus: ^5.0.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Fonts loaded via google_fonts package
